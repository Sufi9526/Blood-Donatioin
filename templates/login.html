{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

    <!-- Favicon for website icon -->
    <link rel="shortcut icon" href="{% static 'images/logo.png' %}">
    <style>
        body {
            background: url("{% static 'images/slbg.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            max-width: 400px;
            width: 100%;
            animation: fadeIn 0.8s ease-in-out;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translaty
                
                
                eY(0); }
        }
        .toggle-password {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>

<div class="card p-4">
    <img src="{% static 'images/logo.png' %}" alt="Logo" width="100">
    <h3 class="text-center mb-3 text-dark">Login</h3>
    <form  method="POST">
        {% csrf_token %}
        <div class="mb-3 position-relative">
            <label class="form-label text-dark">Email</label>
            <input type="email" class="form-control"  name="email" placeholder="Enter email" required>
        </div>
        <div class="mb-3 position-relative">
            <label class="form-label text-dark">Password</label>
            <input type="password" class="form-control"  name="pass1" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="text-center mt-3 text">
        Not have an account? <a href="{% url 'signup' %}" class="btn btn-primary w-100">Signup</a>  

    </p>
</div>
{% if messages %}
        {% for message in messages %}
         {% if message.tags %}  <script>alert("{{ message }}")</script> {% endif %}
         
        {% endfor %}
    
{% endif %}



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
