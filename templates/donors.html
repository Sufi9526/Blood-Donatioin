
{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Donor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
     <!-- Favicon for website icon -->
     <link rel="shortcut icon" href="{% static 'images/logo.png' %}">
    <style>
        body {
            background: url("{% static 'images/fd.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 600px;
            width: 100%;
            margin: auto;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-custom {
            background: #ff5a5f;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #e0484d;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h2 class="mb-3">Blood Donor nearby</h2>

            <lottie-player src="https://assets8.lottiefiles.com/packages/lf20_2cghrrpi.json" 
                background="transparent" speed="1" style="width: 300px; height: 300px;" loop autoplay>
            </lottie-player>

            <table class="table">
                <thead>
                  <tr>
                    <th scope="col">Name</th>
                    <th scope="col">Phone</th>
                    <th scope="col">E-Mail</th>
                  </tr>
                </thead>
                <tbody>
                    {% for d in don %}
                  <tr>
                    <td>{{ d.name }}</td>
                    <td>{{ d.mobile }}</td>
                    <td>{{ d.email }}</td>
                  </tr>
                  {% empty %}
                  <p>No Donors are availible</p>
                  {% endfor %}
                </tbody>
              </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
